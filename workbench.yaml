version: "3.8"

x-db-env: &db_env
  DB_SERVER: db-common
  DB_USER: root
  DB_PASSWD: root_pass

services:
  db-common:
    image: mariadb:10.11
    container_name: multipresta-db-common
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    # We use a heredoc to create a proper multi-line SQL file
    entrypoint: 
      - /bin/sh
      - -c
      - |
        mkdir -p /docker-entrypoint-initdb.d
        printf "CREATE DATABASE IF NOT EXISTS shop_1;\nCREATE DATABASE IF NOT EXISTS shop_2;\nCREATE DATABASE IF NOT EXISTS shop_3;\nCREATE DATABASE IF NOT EXISTS shop_4;\nCREATE DATABASE IF NOT EXISTS shop_5;\nCREATE DATABASE IF NOT EXISTS shop_6;\nCREATE DATABASE IF NOT EXISTS shop_7;\nCREATE DATABASE IF NOT EXISTS shop_8;\nCREATE DATABASE IF NOT EXISTS shop_9;\nCREATE DATABASE IF NOT EXISTS shop_10;\n" > /docker-entrypoint-initdb.d/init_shops.sql
        exec /usr/local/bin/docker-entrypoint.sh mariadbd --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-file=/docker-entrypoint-initdb.d/init_shops.sql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  shop-1:
    image: prestashop/prestashop:latest
    container_name: shop-1
    ports: ["8081:80"]
    depends_on:
      db-common:
        condition: service_healthy
    environment:
      <<: *db_env
      DB_NAME: shop_1
      PS_INSTALL_AUTO: 1
      PS_DOMAIN: DOMAIN_HERE:8081
      PS_LANGUAGE: fr
      PS_COUNTRY: FR
    volumes:
      - shop1_data:/var/www/html
    restart: unless-stopped

  shop-2:
