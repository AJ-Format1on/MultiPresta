version: "3.8"

x-wp-env: &wp_env
  WORDPRESS_DB_HOST: db-common:3306
  WORDPRESS_DB_USER: root
  WORDPRESS_DB_PASSWORD: root_pass

services:
  db-common:
    image: mariadb:10.11
    container_name: multiwp-db-common
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /docker-entrypoint-initdb.d
        printf "CREATE DATABASE IF NOT EXISTS wp_1;\nCREATE DATABASE IF NOT EXISTS wp_2;\nCREATE DATABASE IF NOT EXISTS wp_3;\nCREATE DATABASE IF NOT EXISTS wp_4;\nCREATE DATABASE IF NOT EXISTS wp_5;\nCREATE DATABASE IF NOT EXISTS wp_6;\nCREATE DATABASE IF NOT EXISTS wp_7;\nCREATE DATABASE IF NOT EXISTS wp_8;\nCREATE DATABASE IF NOT EXISTS wp_9;\nCREATE DATABASE IF NOT EXISTS wp_10;\n" > /docker-entrypoint-initdb.d/init_wordpress.sql
        exec /usr/local/bin/docker-entrypoint.sh mariadbd --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-file=/docker-entrypoint-initdb.d/init_wordpress.sql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  wp-1:
    image: wordpress:latest
    container_name: wp-1
    ports: ["8091:80"]
    depends_on:
      db-common:
        condition: service_healthy
    environment:
      <<: *wp_env
      WORDPRESS_DB_NAME: wp_1
    volumes:
      - wp1_data:/var/www/html
    restart: unless-stopped

  wp-2:
    image: wordpress:latest
    container_name: wp-2
    ports: ["8092:80"]
    depends_on:
      db-common:
        condition: service_healthy
    environment:
      <<: *wp_env
      WORDPRESS_DB_NAME: wp_2
    volumes:
      - wp2_data:/var/www/html
    restart: unless-stopped

  wp-3:
