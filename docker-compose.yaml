version: "3.8"

x-db-env: &db_env
  DB_SERVER: db-common
  DB_USER: root
  DB_PASSWD: root_pass

x-ps-install-common: &ps_install_common
  image: prestashop/prestashop:latest
  depends_on:
    db-common:
      condition: service_healthy
    db-init:
      condition: service_completed_successfully
  environment:
    <<: *db_env
    PS_INSTALL_AUTO: 0
    PS_DEV_MODE: 0
    PS_ALL_LANGUAGES: 0
    PS_LANGUAGE: en
    PS_COUNTRY: FR
  restart: "no"

x-ps-web-common: &ps_web_common
  image: prestashop/prestashop:latest
  depends_on:
    db-common:
      condition: service_healthy
  environment:
    <<: *db_env
    PS_INSTALL_AUTO: 0
    PS_DEV_MODE: 0
  restart: unless-stopped

services:
  db-common:
    image: mariadb:10.11
    container_name: multipresta-db-common
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: always

  # Create all databases once
  db-init:
    image: mariadb:10.11
    depends_on:
      db-common:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "mariadb -h db-common -uroot -p$$MYSQL_ROOT_PASSWORD -e '
      CREATE DATABASE IF NOT EXISTS shop_1  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_2  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_3  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_4  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_5  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_6  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_7  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_8  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_9  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      CREATE DATABASE IF NOT EXISTS shop_10 CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
      '"
    restart: "no"

  # -------------------------
  # SHOP 1 (install -> web)
  # -------------------------
  shop-1-install:
    <<: *ps_install_common
    container_name: multipresta-shop-1-install
    environment:
      <<: *db_env
      DB_NAME: shop_1
    volumes:
      - shop1_data:/var/www/html
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "php -d memory_limit=-1 /var/www/html/install/index_cli.php
      --domain=DOMAIN:8081
      --db_server=db-common:3306 --db_name=shop_1 --db_user=root --db_password=root_pass
      --prefix=ps_
      --firstname=Admin --lastname=One
      --password=prestashop_password --email=admin1@prestashop.com
      --language=fr --country=FR --all_languages=0
      --newsletter=0 --send_email=0 --ssl=0"

  shop-1:
    <<: *ps_web_common
    container_name: multipresta-shop-1
    ports: ["8081:80"]
    depends_on:
      shop-1-install:
        condition: service_completed_successfully
    environment:
      <<: *db_env
      DB_NAME: shop_1
    volumes:
      - shop1_data:/var/www/html

  # -------------------------
